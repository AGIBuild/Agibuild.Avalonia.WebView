  summary: >-
    Configures the WebView environment for dev server proxy mode.

    All requests to the custom scheme are proxied to the given URL.
  example: []
  syntax:
    content: public static WebViewEnvironmentOptions AddDevServerProxy(this WebViewEnvironmentOptions options, string schemeName, string devServerUrl)
    parameters:
    - id: options
      type: Agibuild.Fulora.WebViewEnvironmentOptions
      description: The environment options to configure.
    - id: schemeName
      type: System.String
      description: The custom scheme name (e.g. "app").
    - id: devServerUrl
      type: System.String
      description: The dev server URL (e.g. "http://localhost:5173").
    return:
      type: Agibuild.Fulora.WebViewEnvironmentOptions
