  summary: >-
    Configures the WebView environment for embedded SPA hosting (production mode).

    Call this at startup; all WebView controls that enable SPA hosting will serve from embedded resources.
  example: []
  syntax:
    content: public static WebViewEnvironmentOptions AddEmbeddedFileProvider(this WebViewEnvironmentOptions options, string schemeName, Assembly resourceAssembly, string resourcePrefix)
    parameters:
    - id: options
      type: Agibuild.Fulora.WebViewEnvironmentOptions
      description: The environment options to configure.
    - id: schemeName
      type: System.String
      description: 'The custom scheme name (e.g. "app"). Default: "app".'
    - id: resourceAssembly
      type: System.Reflection.Assembly
      description: Assembly containing embedded resources.
    - id: resourcePrefix
      type: System.String
      description: Embedded resource path prefix (e.g. "wwwroot").
    return:
      type: Agibuild.Fulora.WebViewEnvironmentOptions
    content.vb: Public Shared Function AddEmbeddedFileProvider(options As WebViewEnvironmentOptions, schemeName As String, resourceAssembly As Assembly, resourcePrefix As String) As WebViewEnvironmentOptions
