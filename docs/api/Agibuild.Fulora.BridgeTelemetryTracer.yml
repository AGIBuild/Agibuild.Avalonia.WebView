  summary: >-
    An <xref href="Agibuild.Fulora.IBridgeTracer" data-throw-if-not-resolved="false"></xref> that auto-collects bridge call metrics via

    <xref href="Agibuild.Fulora.ITelemetryProvider" data-throw-if-not-resolved="false"></xref>. Tracks latency on call end and errors on call error.

    Optionally delegates to an inner tracer.
