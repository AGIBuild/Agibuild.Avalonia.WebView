  summary: >-
    Extension methods for registering Avalonia WebDialog and WebAuthBroker services.

    <p>

    Call <code>services.AddWebViewDialogServices()</code> to register:

    <ul><li><xref href="Agibuild.Fulora.IWebDialogFactory" data-throw-if-not-resolved="false"></xref> → <xref href="Agibuild.Fulora.AvaloniaWebDialogFactory" data-throw-if-not-resolved="false"></xref> (singleton)</li><li><xref href="Agibuild.Fulora.IWebAuthBroker" data-throw-if-not-resolved="false"></xref> → <xref href="Agibuild.Fulora.WebAuthBroker" data-throw-if-not-resolved="false"></xref> (transient)</li></ul>

    </p>

    <p>

    Note: Call <code>services.AddWebView()</code> first if you also need

    the base <xref href="Agibuild.Fulora.IWebView" data-throw-if-not-resolved="false"></xref> factory and dispatcher registrations.

    </p>
