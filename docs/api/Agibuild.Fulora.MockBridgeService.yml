  namespace: Agibuild.Fulora
  summary: >-
    A mock implementation of <xref href="Agibuild.Fulora.IBridgeService" data-throw-if-not-resolved="false"></xref> for unit testing.

    Allows testing ViewModels and services that depend on Bridge without a real WebView.

    <p>

    Deliverable 1.5: MockBridge for consumer unit testing.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">var mock = new MockBridgeService();

    mock.SetupExpose&lt;IAppService&gt;(); // Records that Expose was called

    var proxy = mock.SetupProxy&lt;IUiController&gt;(new FakeUiController());


    var vm = new MyViewModel(mock);

    await vm.Initialize();


    Assert.True(mock.WasExposed&lt;IAppService&gt;());</code></pre>
  syntax:
    content: 'public sealed class MockBridgeService : IBridgeService'
    content.vb: Public NotInheritable Class MockBridgeService Implements IBridgeService
