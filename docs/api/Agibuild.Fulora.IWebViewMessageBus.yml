  summary: >-
    Subscribes to a topic with a target WebView filter. Only receives messages whose

    <xref href="Agibuild.Fulora.WebViewMessage.SourceWebViewId" data-throw-if-not-resolved="false"></xref> matches <code class="paramref">targetWebViewId</code>.
  example: []
  syntax:
    content: IDisposable Subscribe(string topic, string targetWebViewId, Action<WebViewMessage> handler)
    parameters:
    - id: topic
      type: System.String
      description: The topic to subscribe to.
    - id: targetWebViewId
      type: System.String
      description: Only receive messages from this source WebView ID.
    - id: handler
      type: System.Action{Agibuild.Fulora.WebViewMessage}
      description: Callback invoked for each matching message.
    return:
      type: System.IDisposable
      description: A disposable that removes the subscription when disposed.
    content.vb: Function Subscribe(topic As String, targetWebViewId As String, handler As Action(Of WebViewMessage)) As IDisposable
