  summary: >-
    Runtime implementation of <xref href="Agibuild.Fulora.IBridgeEvent%601" data-throw-if-not-resolved="false"></xref> that allows C# code to push events to JavaScript.

    <p>

    Declare properties as <xref href="Agibuild.Fulora.IBridgeEvent%601" data-throw-if-not-resolved="false"></xref> on the interface, and use <xref href="Agibuild.Fulora.BridgeEvent%601" data-throw-if-not-resolved="false"></xref>

    in the implementation to emit events:

    <pre><code class="lang-csharp">private readonly BridgeEvent&lt;Notification&gt; _onNew = new();

    public IBridgeEvent&lt;Notification&gt; OnNew =&gt; _onNew;

    // Push: _onNew.Emit(new Notification(...));</code></pre>

    </p>
