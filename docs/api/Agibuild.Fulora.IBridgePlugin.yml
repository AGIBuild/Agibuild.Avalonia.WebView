  assemblies:
  - Agibuild.Fulora.Core
  namespace: Agibuild.Fulora
  summary: >-
    Marker interface for bridge plugins. Implementations provide a static manifest of

    bridge services that can be registered in one call via <xref href="Agibuild.Fulora.BridgePluginExtensions.UsePlugin%60%601(Agibuild.Fulora.IBridgeService%2cSystem.IServiceProvider)" data-throw-if-not-resolved="false"></xref>.

    <p>

    Uses C# static abstract members for NativeAOT-safe compile-time discovery.

    The implementing class is never instantiated — it acts purely as a manifest.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">public class MyPlugin : IBridgePlugin

    {
        public static IEnumerable&lt;BridgePluginServiceDescriptor&gt; GetServices()
        {
            yield return BridgePluginServiceDescriptor.Create&lt;IMyService&gt;(
                sp =&gt; new MyServiceImpl());
        }
    }

    // Usage: bridge.UsePlugin&lt;MyPlugin&gt;();</code></pre>
  syntax:
    content: public interface IBridgePlugin
    content.vb: Public Interface IBridgePlugin
